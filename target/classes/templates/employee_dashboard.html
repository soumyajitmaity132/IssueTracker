<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Employee Dashboard</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow-x: hidden;
            font-family: 'Segoe UI', sans-serif;
            color: #fff;
            background: transparent;
        }

        /* === 3D Background Animation === */
        .animated-bg {
            position: fixed;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at bottom, #0d6efd, #110933);
            z-index: -1;
            overflow: hidden;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            animation: float 20s infinite ease-in-out;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) scale(0.5);
                opacity: 0;
            }
            50% {
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) scale(1.2);
                opacity: 0;
            }
        }

        .circle:nth-child(1) { left: 10%; width: 60px; height: 60px; animation-delay: 0s; }
        .circle:nth-child(2) { left: 30%; width: 40px; height: 40px; animation-delay: 5s; }
        .circle:nth-child(3) { left: 50%; width: 100px; height: 100px; animation-delay: 2s; }
        .circle:nth-child(4) { left: 70%; width: 80px; height: 80px; animation-delay: 7s; }
        .circle:nth-child(5) { left: 85%; width: 50px; height: 50px; animation-delay: 3s; }

        /* === Navbar === */
        .navbar {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(6px);
        }

        .navbar .navbar-brand {
            font-weight: bold;
            color: #fff;
        }

        .navbar .nav-link, .navbar .btn {
            color: #fff !important;
        }

        /* === Dashboard Styling === */
        .dashboard-box {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 2rem;
            margin-top: 4rem;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .btn-dashboard {
            font-size: 1.1rem;
            margin: 1rem;
            padding: 1rem 2rem;
            border-radius: 12px;
            border: none;
            background-color: #ffc107;
            color: #000;
            font-weight: bold;
        }

        .btn-dashboard:hover {
            background-color: #e0a800;
        }

        .btn-submit-ticket {
            background: linear-gradient(135deg, #00c9a7, #92fe9d);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 201, 167, 0.4);
            transition: all 0.3s ease-in-out;
            margin: 1rem 0;
            text-decoration: none;
        }

        .btn-submit-ticket:hover {
            background: linear-gradient(135deg, #92fe9d, #00c9a7);
            box-shadow: 0 6px 20px rgba(0, 201, 167, 0.6);
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<!-- 3D Animated Background -->
<div class="animated-bg">
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
</div>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid px-4">
        <a href="/logout" class="btn btn-outline-light me-3">⬅ Back</a>
        <a class="navbar-brand" href="#">Company Tracker</a>
        <div class="ms-auto d-flex align-items-center gap-2">
            <a href="/employee/deleted-tickets" class="btn btn-danger">🎫 View Deleted Ticket</a>
            <a href="/logout" class="btn btn-outline-light">Logout</a>
        </div>
    </div>
</nav>

<!-- Main Content -->
<div class="container">
    <div class="dashboard-box mt-5">
        <a href="/submit" class="btn btn-submit-ticket">📝 Submit New Ticket</a>
        <h2 class="mt-3">Welcome, <span th:text="${username}"></span></h2>
        <div class="d-flex flex-wrap justify-content-center mt-4">
            <a href="/employee/raised" class="btn btn-dashboard">📨 Tickets You Raised</a>
            <a href="/employee/assigned" class="btn btn-dashboard">🧾 Tickets Assigned to You</a>
        </div>
    </div>
</div>

</body>
</html>
